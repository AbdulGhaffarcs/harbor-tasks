schema_version = "1.1"
version = "1.0"

[[sources]]
source_name = "Synthetic CC0 conveyor sorting network (seed=42)"
source_url = "https://github.com/AbdulGhaffarcs/harbor-tasks"
source_license = "CC0"
derived_files = ["environment/data/sorting_network.png"]
notes = "Fully synthetic sorting network diagram generated with Pillow. 6 nodes, 4 bins, 10-package queue. No real data. CC0."

[task]
name = "chromatic-sorting-matrix"
description = "Extract DAG topology from a sorting network image into Graphviz DOT, then simulate 10 packages through the state-mutating network and output a trace CSV."
authors = [{ name = "Abdul Ghaffar", email = "abghaffar360@gmail.com" }]
keywords = ["visual-reasoning","state-machine","topology","graphviz","simulation"]

[metadata]
difficulty = "hard"
category = "visual-reasoning"
difficulty_explanation = "Multi-step: (1) extract 6-node topology with colors and arrow states from image; (2) simulate 10 packages with conditional state mutation (arrow flips when color matches); (3) output DOT + CSV. Difficulty from visual complexity not computation."
tags = ["visual-reasoning","state-machine","topology-extraction","graphviz","csv","multi-step"]
parser_name = "pytest"
source = "https://github.com/AbdulGhaffarcs/harbor-tasks"

[solution]
env = {}

[verifier]
timeout_sec = 300.0
[verifier.env]

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 2
memory_mb = 2048
storage_mb = 2048
gpus = 0
