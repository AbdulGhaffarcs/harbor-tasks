version = "1.0"
schema_version = "1.1"

[task]
name = "chromatic-sorting-matrix"
description = "Extract a directed acyclic graph (DAG) topology into Graphviz DOT and simulate a state machine outputting a trace CSV."
authors = [{ name = "abdulghaffar_official", email = "abghaffar360@gmail.com" }]
tags = ["visual-reasoning", "state-machine", "topology-extraction", "graphviz", "csv"]

[metadata]
difficulty = "hard"
category = "visual-reasoning"
difficulty_explanation = "Anti-cheese design: The agent must generate a Graphviz DOT file proving perfect extraction of visually encoded topology and initial states. It must then execute an algorithmic trace (outputting a CSV) based on a visually encoded queue of inputs, dynamically mutating states per step."

[[sources]]
name = "Harbor Synthetic Logic Datasets"
url = "https://github.com/AbdulGhaffarcs/harbor-tasks"
license = "CC0-1.0"

[solution]
env = {}
command = "bash solution/solve.sh"

[verifier]
parser_name = "pytest"
timeout_sec = 120.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 2
memory_mb = 2048
storage_mb = 2048
gpus = 0