schema_version = "1.1"
version = "1.0"

[[sources]]
source_name = "Synthetic CC0 architectural floor plan (seed=42)"
source_url = "https://github.com/AbdulGhaffarcs/harbor-tasks"
source_license = "CC0"
derived_files = ["environment/data/floorplan.png"]
notes = "Procedurally generated with Pillow (seed=42, 800x600px, 12 rooms, 13 doors with mixed sweep directions, 8 windows). CC0."

[task]
name = "floor-plan-svg-annotation"
description = "Given a synthetic floor plan, produce an SVG annotation. Room bboxes and door hinge positions are provided. Agent must find door leaf-end positions and window midpoints from the image."
authors = [{ name = "Abdul Ghaffar", email = "abghaffar360@gmail.com" }]
keywords = ["floor-plan", "svg", "geometric-annotation", "visual-reasoning", "spatial-analysis"]

[metadata]
difficulty = "medium"
category = "visual-reasoning"
difficulty_explanation = "Room bboxes and door hinge positions are provided in JSON. Agent must visually locate door leaf-ends (mixed CW/CCW sweep directions) and window midpoints from floorplan.png. Running annotate.py with defaults gives 50%; improving requires image analysis."
tags = ["floor-plan", "svg-generation", "geometric-annotation", "spatial-reasoning", "layout-analysis"]
parser_name = "pytest"
source = "https://github.com/AbdulGhaffarcs/harbor-tasks"

[solution]
env = {}

[verifier]
timeout_sec = 300.0

[verifier.env]

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 2
memory_mb = 2048
storage_mb = 2048
gpus = 0
